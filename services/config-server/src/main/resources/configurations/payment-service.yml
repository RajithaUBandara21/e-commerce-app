spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payment
    username: rajitha
    password: rajitha
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerialization
      value-serializer: org.springFramework.kafka.support.serializer.jsonSerializer
      properties:
        spring.json.type.mapping: PaymentNotificationRequestDTO:com.rajitha.ecommerce.dto.PaymentNotificationRequestDTO;
server:
  port: 8060
